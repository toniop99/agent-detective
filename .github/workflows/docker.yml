name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  LOCAL_TEST_TAG: agent-detective:ci

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      pass: ${{ steps.ci-result.outputs.pass }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - id: ci-result
        run: echo "pass=true" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: ci
    if: needs.ci.outputs.pass == 'true'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AGENTS=opencode
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image for PR (load locally, single arch)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.LOCAL_TEST_TAG }}
          build-args: |
            AGENTS=opencode
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify multi-arch manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "Inspecting multi-arch manifest for $IMAGE"
          docker buildx imagetools inspect "$IMAGE"
          echo "Checking for linux/amd64..."
          docker buildx imagetools inspect "$IMAGE" | grep -q "linux/amd64" || { echo "ERROR: linux/amd64 not found"; exit 1; }
          echo "Checking for linux/arm64..."
          docker buildx imagetools inspect "$IMAGE" | grep -q "linux/arm64" || { echo "ERROR: linux/arm64 not found"; exit 1; }
          echo "Multi-arch manifest verified successfully"

  scan:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Pull image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Pull image (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Start container (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker run -d --name agent-detective-test \
            -p 3001:3001 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Start container (PR)
        if: github.event_name == 'pull_request'
        run: |
          docker run -d --name agent-detective-test \
            -p 3001:3001 \
            ${{ env.LOCAL_TEST_TAG }}

      - name: Wait for container to be ready
        run: |
          for i in {1..30}; do
            if docker exec agent-detective-test wget -qO- http://127.0.0.1:3001/api/health 2>/dev/null | grep -q '"status"'; then
              echo "Container is ready"
              exit 0
            fi
            echo "Waiting for container... ($i)"
            sleep 2
          done
          echo "Container failed to start"
          docker logs agent-detective-test
          exit 1

      - name: Check health endpoint
        run: |
          docker exec agent-detective-test wget -qO- http://127.0.0.1:3001/api/health | grep -q '"status"' || exit 1

      - name: Check agent list endpoint
        run: |
          docker exec agent-detective-test wget -qO- http://127.0.0.1:3001/api/agent/list | grep -q '\[' || exit 1

      - name: Cleanup
        if: always()
        run: |
          docker stop agent-detective-test || true
          docker rm agent-detective-test || true
