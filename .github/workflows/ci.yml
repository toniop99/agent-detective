name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Generated plugin docs match Zod
        run: pnpm docs:plugins:check

      - name: Generated app config doc matches Zod
        run: pnpm docs:config:check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build && pnpm run build:app

      - name: Smoke test built app (HTTP)
        env:
          NODE_ENV: production
        run: |
          node dist/index.js &
          PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3001/api/health | grep -q '"status"'; then
              echo "Health OK"
              kill "$PID" 2>/dev/null || true
              wait "$PID" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "Smoke: server did not become healthy in time"
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true
          exit 1