name: Release Native Binaries

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-binary-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            out: agent-detective-linux-x64
          - os: ubuntu-24.04-arm64
            target: linux-arm64
            out: agent-detective-linux-arm64
          - os: macos-latest
            target: darwin-arm64
            out: agent-detective-darwin-arm64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      # Pin a concrete Node 25.x: major-only "25" can incorrectly resolve to the
      # runner tool-cache (20/22/24) instead of downloading Node 25 — see actions/setup-node README.
      - uses: actions/setup-node@v6
        with:
          node-version: '25.9.0'
          token: ${{ github.token }}

      - run: pnpm install --frozen-lockfile

      - name: Build (workspace + SEA bundle)
        run: pnpm run build && pnpm run build:sea:app

      - name: Build SEA executable
        run: |
          mkdir -p dist
          cat > sea-config.json <<'EOF'
          {
            "main": "dist-sea/index.cjs",
            "output": "dist/${{ matrix.out }}",
            "disableExperimentalSEAWarning": true
          }
          EOF
          node --build-sea sea-config.json
          chmod +x "dist/${{ matrix.out }}"

      - name: Create checksums
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.out }}" > "checksums-${{ matrix.target }}.txt"
          else
            shasum -a 256 "${{ matrix.out }}" > "checksums-${{ matrix.target }}.txt"
          fi

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: dist-sea
          format: cyclonedx-json
          output-file: dist/sbom-${{ matrix.target }}.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign release assets (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature "dist/${{ matrix.out }}.sig" \
            --output-certificate "dist/${{ matrix.out }}.cert" \
            "dist/${{ matrix.out }}"

          cosign sign-blob --yes \
            --output-signature "dist/checksums-${{ matrix.target }}.txt.sig" \
            --output-certificate "dist/checksums-${{ matrix.target }}.txt.cert" \
            "dist/checksums-${{ matrix.target }}.txt"

          cosign sign-blob --yes \
            --output-signature "dist/sbom-${{ matrix.target }}.cdx.json.sig" \
            --output-certificate "dist/sbom-${{ matrix.target }}.cdx.json.cert" \
            "dist/sbom-${{ matrix.target }}.cdx.json"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/${{ matrix.out }}
            dist/checksums-${{ matrix.target }}.txt
            dist/sbom-${{ matrix.target }}.cdx.json
            dist/${{ matrix.out }}.sig
            dist/${{ matrix.out }}.cert
            dist/checksums-${{ matrix.target }}.txt.sig
            dist/checksums-${{ matrix.target }}.txt.cert
            dist/sbom-${{ matrix.target }}.cdx.json.sig
            dist/sbom-${{ matrix.target }}.cdx.json.cert
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

