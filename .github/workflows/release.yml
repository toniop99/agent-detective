name: GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      pass: ${{ steps.ci-result.outputs.pass }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build && pnpm run build:app

      - id: ci-result
        run: echo "pass=true" >> $GITHUB_OUTPUT

  release:
    runs-on: ubuntu-latest
    needs: [ci]
    if: needs.ci.outputs.pass == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate version format
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          if ! [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in format X.Y.Z"
            exit 1
          fi
          echo "Releasing version: $VERSION"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ## Native binaries

            Download the release asset for your platform (uploaded by the **Release Native Binaries** workflow):

            - `agent-detective-linux-x64`
            - `agent-detective-linux-arm64`
            - `agent-detective-darwin-arm64`
            - `checksums-<target>.txt`
            - `sbom-<target>.cdx.json` (CycloneDX SBOM)
            - `*.sigstore.json` (Cosign v3 Sigstore bundles for signatures)

            Then run:

            ```bash
            chmod +x ./agent-detective-*
            ./agent-detective-linux-x64 --help
            ./agent-detective-linux-x64 doctor --config-root /opt/agent-detective
            ./agent-detective-linux-x64 --config-root /opt/agent-detective
            ```

            To verify signatures and install layout, see `docs/operator/binary.md`.

            ### Security

            Release assets include SBOMs and Sigstore bundles for supply-chain verification.
          draft: false
          prerelease: ${{ contains(env.VERSION, 'alpha') || contains(env.VERSION, 'beta') || contains(env.VERSION, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
