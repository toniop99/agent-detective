services:
  agent-detective:
    build:
      context: .
      target: dev
    image: agent-detective:dev
    container_name: agent-detective-dev
    ports:
      - "3001:3001"
    volumes:
      # Hot reload: source code changes reflected immediately
      - ./src:/app/src:rw
      - ./packages:/app/packages:rw
      # Config is read from host (edit on host, container uses updated config)
      - ./config:/app/config:ro
    environment:
      - NODE_ENV=development
      - PORT=3001
      - LOG_LEVEL=info
    # Dev image (Dockerfile target dev) does not bundle CLI agents. Install OpenCode on the host
    # (npm install -g opencode-ai; see https://opencode.ai/docs) so `opencode` is on PATH inside this container.
    # For agents baked into the image, use docker-compose.ghcr.yml or docker-compose.prod.yml instead.
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health | grep -q '\"status\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Optional: Uncomment to mount repos directory for repository analysis
# Replace /path/to/repos with actual path to your repositories
#
# repos:
#   driver: local
#
# services:
#   agent-detective:
#     volumes:
#       - repos-data:/repos
#
# volumes:
#   repos-data:
#     driver: local
#     driver_opts:
#       type: none
#       o: bind
#       device: /path/to/repos

networks:
  default:
    name: agent-detective-network
