# Shared environment list for `docker-compose.prod.yml` and `docker-compose.ghcr.yml` (include this file; do not `up` it alone).
x-agent-detective-env: &agent-detective-env
  - NODE_ENV=production
  - PORT=3001
  - LOG_LEVEL=${LOG_LEVEL:-info}
  - AGENT=${AGENT:-opencode}
  - AGENTS_OPENCODE_MODEL=${AGENTS_OPENCODE_MODEL:-}
  - AGENTS_CLAUDE_MODEL=${AGENTS_CLAUDE_MODEL:-}
  - AGENTS_CURSOR_MODEL=${AGENTS_CURSOR_MODEL:-}
  - REPO_CONTEXT_GIT_LOG_MAX_COMMITS=${REPO_CONTEXT_GIT_LOG_MAX_COMMITS:-50}
  - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
  - JIRA_EMAIL=${JIRA_EMAIL:-}
  - JIRA_BASE_URL=${JIRA_BASE_URL:-}
