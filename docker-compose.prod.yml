# Usage:
#   docker compose -f docker-compose.prod.yml up --build
#
# To run a pre-built image from GHCR without building locally, use docker-compose.ghcr.yml.
#
# Jira and other secrets: use environment variables (see docs/docker.md) or a
# compose override file; this file does not require Docker "secrets" files.

include:
  - docker-compose.env-shared.yml

services:
  agent-detective:
    build:
      context: .
      target: production
      args:
        # Comma-separated CLI agents to pre-install in the image (opencode, claude)
        AGENTS: ${AGENTS:-opencode}
    image: ${IMAGE_NAME:-agent-detective:latest}
    container_name: agent-detective
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - ./config:/app/config:ro
      - ./plugins:/app/plugins:ro
    environment: *agent-detective-env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health | grep -q '\"status\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

networks:
  default:
    name: agent-detective-network
