# Run the pre-built image from GitHub Container Registry (no local build).
# Usage:
#   docker compose -f docker-compose.ghcr.yml pull
#   docker compose -f docker-compose.ghcr.yml up -d
#
# Copy config from the repo (e.g. config/default.json) next to this file, or mount your own.
# Override image: export GHCR_IMAGE=ghcr.io/<owner>/<repo>:stable
#
# OpenCode CLI is bundled on main as `opencode` (installed from npm package opencode-ai).
# Configure LLM providers per https://opencode.ai/docs (env vars or OpenCode config under the container user's home).

services:
  agent-detective:
    image: ${GHCR_IMAGE:-ghcr.io/toniop99/agent-detective:latest}
    container_name: agent-detective
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - ./config:/app/config:ro
      - ./plugins:/app/plugins:ro
    environment:
      - NODE_ENV=production
      - PORT=3001
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - AGENT=${AGENT:-opencode}
      - MODEL=${MODEL:-}
      - AGENTS_OPENCODE_MODEL=${AGENTS_OPENCODE_MODEL:-}
      - AGENTS_CLAUDE_MODEL=${AGENTS_CLAUDE_MODEL:-}
      - AGENTS_GEMINI_MODEL=${AGENTS_GEMINI_MODEL:-}
      - REPO_CONTEXT_GIT_LOG_MAX_COMMITS=${REPO_CONTEXT_GIT_LOG_MAX_COMMITS:-50}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_BASE_URL=${JIRA_BASE_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health | grep -q '\"status\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: agent-detective-network
